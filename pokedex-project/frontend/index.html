<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pokedex</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
background:#0f172a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#111827;
border-bottom:1px solid #1f2937;
}

header h1{
margin:0;
font-weight:600;
}

.search-box input{
padding:10px 16px;
border-radius:8px;
border:none;
background:#1f2937;
color:white;
outline:none;
width:200px;
}

select{
padding:10px;
border-radius:8px;
background:#1f2937;
color:white;
border:none;
}

/* CONTAINER */

.container{
display:grid;
grid-template-columns:repeat(auto-fill,260px);
gap:30px;
padding:40px;
justify-content:center;
}

/* CARD */

.card{
background:#1f2937;
border-radius:16px;
padding:20px;
text-align:center;
transition:0.25s;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card:hover{
transform:translateY(-8px) scale(1.03);
}

.pokemon-img{
width:160px;
transition:0.3s;
}

.card:hover .pokemon-img{
transform:scale(1.1);
}

.nome{
font-size:22px;
font-weight:600;
margin-top:10px;
}

.id{
font-size:13px;
color:#9ca3af;
}

.tipo{
margin-top:10px;
display:inline-block;
background:#374151;
padding:6px 12px;
border-radius:8px;
font-size:13px;
}

.stats{
margin-top:14px;
background:#111827;
padding:12px;
border-radius:10px;
font-size:13px;
line-height:1.6;
}

.loading{
text-align:center;
margin-top:50px;
font-size:18px;
}

</style>
</head>

<body>

<header>

<h1>Pokedex</h1>

<div style="display:flex; gap:10px;">

<div class="search-box">
<input type="text" id="searchInput" placeholder="Buscar Pokemon...">
</div>

<select id="typeFilter">
<option value="">Todos</option>
<option value="Grass">Grass</option>
<option value="Fire">Fire</option>
<option value="Water">Water</option>
<option value="Electric">Electric</option>
<option value="Psychic">Psychic</option>
<option value="Ice">Ice</option>
<option value="Dragon">Dragon</option>
<option value="Dark">Dark</option>
<option value="Fairy">Fairy</option>
<option value="Normal">Normal</option>
<option value="Fighting">Fighting</option>
<option value="Flying">Flying</option>
<option value="Poison">Poison</option>
<option value="Ground">Ground</option>
<option value="Rock">Rock</option>
<option value="Bug">Bug</option>
<option value="Ghost">Ghost</option>
<option value="Steel">Steel</option>
</select>

</div>

</header>

<div class="loading" id="loading">
Carregando Pokemon...
</div>

<div class="container" id="pokemonContainer"></div>

<script>

const container=document.getElementById("pokemonContainer");
const loading=document.getElementById("loading");
const searchInput=document.getElementById("searchInput");
const typeFilter=document.getElementById("typeFilter");

let todosPokemons=[];

function renderizarPokemons(pokemons){

container.innerHTML="";

pokemons.forEach(pokemon=>{

const card=document.createElement("div");
card.classList.add("card");

card.innerHTML=`

<img class="pokemon-img"
src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pokemon.id}.png">

<div class="nome">${pokemon.nome}</div>

<div class="id">#${pokemon.id}</div>

<div class="tipo">
${pokemon.tipo1 || ""} ${pokemon.tipo2 || ""}
</div>

<div class="stats">
HP: ${pokemon.hp}<br>
Attack: ${pokemon.attack}<br>
Defense: ${pokemon.defense}<br>
Speed: ${pokemon.speed}
</div>

`;

container.appendChild(card);

});

}

function aplicarFiltros(){

const texto=searchInput.value.toLowerCase();
const tipoSelecionado=typeFilter.value;

const filtrados=todosPokemons.filter(pokemon=>{

const matchNome=pokemon.nome.toLowerCase().includes(texto);

const matchTipo=
tipoSelecionado==="" ||
pokemon.tipo1===tipoSelecionado ||
pokemon.tipo2===tipoSelecionado;

return matchNome && matchTipo;

});

renderizarPokemons(filtrados);

}

fetch("http://localhost:3000/pokemons")

.then(response=>response.json())

.then(data=>{

todosPokemons=data;

loading.style.display="none";

renderizarPokemons(data);

})

.catch(error=>{

loading.innerText="Erro ao carregar Pokemon";

console.error(error);

});

searchInput.addEventListener("input",aplicarFiltros);
typeFilter.addEventListener("change",aplicarFiltros);

</script>

</body>
</html>
