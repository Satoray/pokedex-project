<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pokedex</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:
radial-gradient(circle at top,#2e1065,#020617 75%);

color:white;

min-height:100vh;

overflow-x:hidden;

}

body::before{

content:"";

position:fixed;

inset:0;

background:

linear-gradient(rgba(168,85,247,0.06) 1px,transparent 1px),
linear-gradient(90deg,rgba(168,85,247,0.06) 1px,transparent 1px);

background-size:40px 40px;

z-index:-2;

}

body::after{

content:"";

position:fixed;

width:700px;
height:700px;

background:
radial-gradient(circle,#a855f744,transparent 70%);

top:-200px;
right:-200px;

filter:blur(70px);

z-index:-1;

}

header{

display:flex;

justify-content:space-between;

align-items:center;

padding:24px 40px;

background:rgba(15,23,42,0.8);

backdrop-filter:blur(18px);

border-bottom:1px solid #a855f755;

position:sticky;

top:0;

z-index:999;

}

header h1{

font-family:'Orbitron',sans-serif;

font-size:34px;

letter-spacing:3px;

color:#d8b4fe;

text-shadow:
0 0 10px #c084fc,
0 0 25px #9333ea;

}

.controls{

display:flex;

gap:12px;

flex-wrap:wrap;

}

.search-box input,
select{

padding:12px 16px;

border-radius:14px;

border:1px solid #9333ea55;

background:#111827;

color:white;

outline:none;

font-family:'Orbitron',sans-serif;

transition:0.3s;

box-shadow:
0 0 10px #9333ea22;

}

.search-box input:focus,
select:focus{

transform:scale(1.03);

border:1px solid #c084fc;

box-shadow:
0 0 18px #9333eaaa;

}

.container{

display:grid;

grid-template-columns:
repeat(auto-fill,300px);

gap:35px;

padding:45px;

justify-content:center;

}

.card{

position:relative;

background:
linear-gradient(
145deg,
rgba(30,27,75,0.95),
rgba(2,6,23,0.98)
);

border-radius:28px;

padding:24px;

overflow:hidden;

transition:0.35s;

backdrop-filter:blur(10px);

}

.card::before{

content:"";

position:absolute;

inset:0;

background:
linear-gradient(
130deg,
transparent,
rgba(192,132,252,0.08),
transparent
);

transform:translateX(-100%);

transition:0.8s;

}

.card:hover::before{
transform:translateX(100%);
}

.card:hover{

transform:
translateY(-12px)
scale(1.03);

}

.pokemon-img{

width:180px;

transition:0.35s;

filter:
drop-shadow(0 0 18px rgba(168,85,247,0.4));

}

.card:hover .pokemon-img{

transform:
scale(1.12)
rotate(-2deg);

filter:
drop-shadow(0 0 35px rgba(192,132,252,0.95));

}

.nome{

font-family:'Orbitron',sans-serif;

font-size:24px;

margin-top:10px;

letter-spacing:1px;

text-shadow:
0 0 10px rgba(192,132,252,0.5);

}

.id{

margin-top:5px;

font-size:13px;

color:#cbd5e1;

}

.tipos{

display:flex;

justify-content:center;

gap:8px;

margin-top:15px;

flex-wrap:wrap;

}

.badge{

padding:8px 14px;

border-radius:999px;

font-size:11px;

font-weight:700;

letter-spacing:1px;

text-transform:uppercase;

color:white;

box-shadow:
0 0 12px rgba(255,255,255,0.15);

}

.stats{

margin-top:18px;

background:#020617;

padding:15px;

border-radius:18px;

border:1px solid #9333ea33;

}

.stat{

margin-bottom:14px;

}

.stat-top{

display:flex;

justify-content:space-between;

font-size:13px;

margin-bottom:6px;

font-family:'Orbitron',sans-serif;

}

.bar{

height:10px;

background:#111827;

border-radius:999px;

overflow:hidden;

}

.fill{

height:100%;

border-radius:999px;

box-shadow:
0 0 12px currentColor;

}

.vantagens{

margin-top:18px;

padding:15px;

border-radius:18px;

background:#020617;

border:1px solid #9333ea33;

}

.vantagens h4{

font-family:'Orbitron',sans-serif;

font-size:12px;

letter-spacing:1px;

margin-bottom:10px;

margin-top:12px;

color:#d8b4fe;

}

.type-list{

display:flex;

gap:7px;

flex-wrap:wrap;

justify-content:center;

}

.mini-badge{

padding:6px 10px;

border-radius:999px;

font-size:10px;

font-weight:700;

letter-spacing:1px;

text-transform:uppercase;

transition:0.2s;

color:white;

}

.mini-badge:hover{

transform:scale(1.08);

filter:brightness(1.2);

}

.loading{

text-align:center;

margin-top:100px;

font-family:'Orbitron',sans-serif;

font-size:22px;

letter-spacing:2px;

color:#d8b4fe;

text-shadow:
0 0 12px #9333ea;

}

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#9333ea;
border-radius:999px;
}

@media(max-width:700px){

header{

flex-direction:column;

gap:20px;

padding:20px;

}

.container{

grid-template-columns:1fr;

padding:20px;

}

}

</style>

</head>

<body>

<header>

<h1>POKEDEX</h1>

<div class="controls">

<div class="search-box">
<input type="text" id="searchInput" placeholder="Buscar Pokémon">
</div>

<select id="typeFilter">

<option value="">Todos</option>

<option value="Legendary">✨ Lendários</option>

<option value="Grass">Grass</option>
<option value="Fire">Fire</option>
<option value="Water">Water</option>
<option value="Electric">Electric</option>
<option value="Psychic">Psychic</option>
<option value="Ice">Ice</option>
<option value="Dragon">Dragon</option>
<option value="Dark">Dark</option>
<option value="Fairy">Fairy</option>
<option value="Normal">Normal</option>
<option value="Fighting">Fighting</option>
<option value="Flying">Flying</option>
<option value="Poison">Poison</option>
<option value="Ground">Ground</option>
<option value="Rock">Rock</option>
<option value="Bug">Bug</option>
<option value="Ghost">Ghost</option>
<option value="Steel">Steel</option>

</select>

</div>

</header>

<div class="loading" id="loading">
CARREGANDO POKÉMONS...
</div>

<div class="container" id="pokemonContainer"></div>

<script>

const container=document.getElementById("pokemonContainer");
const loading=document.getElementById("loading");
const searchInput=document.getElementById("searchInput");
const typeFilter=document.getElementById("typeFilter");

let todosPokemons=[];

const legendaryPokemons=[

"Articuno",
"Zapdos",
"Moltres",
"Mewtwo",
"Mew",
"Raikou",
"Entei",
"Suicune",
"Lugia",
"Ho-Oh",
"Celebi",
"Kyogre",
"Groudon",
"Rayquaza",
"Dialga",
"Palkia",
"Giratina",
"Darkrai",
"Arceus",
"Reshiram",
"Zekrom",
"Kyurem",
"Xerneas",
"Yveltal",
"Zygarde",
"Solgaleo",
"Lunala",
"Necrozma",
"Zacian",
"Zamazenta",
"Eternatus",
"Koraidon",
"Miraidon"

];

const typeColors={

Fire:"#ff4d6d",
Water:"#38bdf8",
Grass:"#22c55e",
Electric:"#facc15",
Psychic:"#ec4899",
Ice:"#67e8f9",
Dragon:"#8b5cf6",
Dark:"#475569",
Fairy:"#f9a8d4",
Normal:"#9ca3af",
Fighting:"#ef4444",
Flying:"#60a5fa",
Poison:"#a855f7",
Ground:"#d97706",
Rock:"#78716c",
Bug:"#84cc16",
Ghost:"#7c3aed",
Steel:"#94a3b8"

};

const typeAdvantages={

Fire:{strong:["Grass","Ice","Bug","Steel"],weak:["Water","Ground","Rock"]},
Water:{strong:["Fire","Ground","Rock"],weak:["Electric","Grass"]},
Grass:{strong:["Water","Ground","Rock"],weak:["Fire","Ice","Poison","Flying","Bug"]},
Electric:{strong:["Water","Flying"],weak:["Ground"]},
Psychic:{strong:["Fighting","Poison"],weak:["Bug","Ghost","Dark"]},
Ice:{strong:["Grass","Ground","Flying","Dragon"],weak:["Fire","Fighting","Rock","Steel"]},
Dragon:{strong:["Dragon"],weak:["Ice","Dragon","Fairy"]},
Dark:{strong:["Psychic","Ghost"],weak:["Fighting","Bug","Fairy"]},
Fairy:{strong:["Dragon","Fighting","Dark"],weak:["Poison","Steel"]},
Normal:{strong:[],weak:["Fighting"]},
Fighting:{strong:["Normal","Rock","Steel","Ice","Dark"],weak:["Flying","Psychic","Fairy"]},
Flying:{strong:["Grass","Fighting","Bug"],weak:["Electric","Ice","Rock"]},
Poison:{strong:["Grass","Fairy"],weak:["Ground","Psychic"]},
Ground:{strong:["Fire","Electric","Poison","Rock","Steel"],weak:["Water","Grass","Ice"]},
Rock:{strong:["Fire","Ice","Flying","Bug"],weak:["Water","Grass","Fighting","Ground","Steel"]},
Bug:{strong:["Grass","Psychic","Dark"],weak:["Fire","Flying","Rock"]},
Ghost:{strong:["Psychic","Ghost"],weak:["Ghost","Dark"]},
Steel:{strong:["Ice","Rock","Fairy"],weak:["Fire","Fighting","Ground"]}

};

function criarBarra(valor,cor){

return `
<div class="bar">
<div class="fill"
style="
width:${valor}%;
background:${cor};
color:${cor};
">
</div>
</div>
`;

}

function renderizarPokemons(pokemons){

container.innerHTML="";

pokemons.forEach(pokemon=>{

const cor=typeColors[pokemon.tipo1] || "#a855f7";

const fortes=
typeAdvantages[pokemon.tipo1]?.strong || [];

const fracos=
typeAdvantages[pokemon.tipo1]?.weak || [];

const card=document.createElement("div");

card.classList.add("card");

card.style.border=`1px solid ${cor}`;
card.style.boxShadow=`0 0 30px ${cor}55`;

card.innerHTML=`

<div style="text-align:center;">

<img class="pokemon-img"
src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pokemon.id}.png">

<div class="nome">
${pokemon.nome}
</div>

<div class="id">
#${pokemon.id}
</div>

<div class="tipos">

<span class="badge"
style="background:${typeColors[pokemon.tipo1]}">
${pokemon.tipo1}
</span>

${pokemon.tipo2 ?
`
<span class="badge"
style="background:${typeColors[pokemon.tipo2]}">
${pokemon.tipo2}
</span>
`
:""}

</div>

</div>

<div class="stats">

<div class="stat">

<div class="stat-top">
<span>HP</span>
<span>${pokemon.hp}</span>
</div>

${criarBarra(pokemon.hp,"#22c55e")}

</div>

<div class="stat">

<div class="stat-top">
<span>ATK</span>
<span>${pokemon.attack}</span>
</div>

${criarBarra(pokemon.attack,"#ef4444")}

</div>

<div class="stat">

<div class="stat-top">
<span>DEF</span>
<span>${pokemon.defense}</span>
</div>

${criarBarra(pokemon.defense,"#3b82f6")}

</div>

<div class="stat">

<div class="stat-top">
<span>SPD</span>
<span>${pokemon.speed}</span>
</div>

${criarBarra(pokemon.speed,"#facc15")}

</div>

</div>

<div class="vantagens">

<h4>◉ FORTE CONTRA</h4>

<div class="type-list">

${fortes.map(tipo=>`

<span class="mini-badge"
style="background:${typeColors[tipo]}">
${tipo}
</span>

`).join("")}

</div>

<h4>◉ FRACO CONTRA</h4>

<div class="type-list">

${fracos.map(tipo=>`

<span class="mini-badge"
style="background:${typeColors[tipo]}">
${tipo}
</span>

`).join("")}

</div>

</div>

`;

container.appendChild(card);

});

}

function aplicarFiltros(){

const texto=
searchInput.value.toLowerCase();

const tipo=
typeFilter.value;

const filtrados=
todosPokemons.filter(pokemon=>{

const matchNome=
pokemon.nome.toLowerCase()
.includes(texto);

let matchTipo=false;

if(tipo==="Legendary"){

matchTipo=
legendaryPokemons.includes(pokemon.nome);

}else{

matchTipo=
tipo==="" ||
pokemon.tipo1===tipo ||
pokemon.tipo2===tipo;

}

return matchNome && matchTipo;

});

renderizarPokemons(filtrados);

}

fetch("http://localhost:3000/pokemons")

.then(response=>response.json())

.then(data=>{

todosPokemons=data;

loading.style.display="none";

renderizarPokemons(data);

})

.catch(error=>{

loading.innerText=
"ERRO AO CARREGAR";

console.error(error);

});

searchInput
.addEventListener("input",aplicarFiltros);

typeFilter
.addEventListener("change",aplicarFiltros);

</script>

</body>
</html>
